    .amb  { fill: #d97706; }

    @media (prefers-color-scheme: dark) {
      .bg  { fill: #161b22; stroke: #30363d; }
      .txt { fill: #c9d1d9; }
      .amb { fill: #f59e0b; }
    }

    text {
      font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
      font-size: 13px;
    }
  </style>

  <rect class="bg" x="0.5" y="0.5" width="749" height="174" rx="6"/>

  <g class="txt">
    <text x="16" y="24" xml:space="preserve">██████╗ ███████╗███████╗███████╗██╗    ██╗ █████╗ ██╗  ██╗    ██████╗  █████╗ ████████╗</text>
