  <text x="16" y="148" class="txt" xml:space="preserve">           <tspan class="amb">⬢<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0s"    repeatCount="indefinite"/></tspan> <tspan class="amb">⬡<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.18s" repeatCount="indefinite"/></tspan> <tspan class="amb">⬢<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.36s" repeatCount="indefinite"/></tspan> <tspan class="amb">⬡<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.54s" repeatCount="indefinite"/></tspan> <tspan class="amb">⬢<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.72s" repeatCount="indefinite"/></tspan>  agentic · privacy-first · honey-powered  <tspan class="amb">⬡<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.72s" repeatCount="indefinite"/></tspan> <tspan class="amb">⬢<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.54s" repeatCount="indefinite"/></tspan> <tspan class="amb">⬡<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.36s" repeatCount="indefinite"/></tspan> <tspan class="amb">⬢<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0.18s" repeatCount="indefinite"/></tspan> <tspan class="amb">⬡<animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" begin="0s"    repeatCount="indefinite"/></tspan></text>

  <!--
    Cycling word at the cursor position. Reads as two phrases:
      "Opus  Mythos  AGI  Soon"  (half-second beat)  "Consciousness is Transdimensional"  (half-second beat, loop)
    Total cycle: 8.8s. Timing tuned so each word gets reading time proportional to length.
  -->
  <g class="txt">
    <text x="600" y="148">Opus<animate attributeName="opacity" values="1;0;0"    keyTimes="0;0.1136;1"               dur="8.8s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="600" y="148" opacity="0">Mythos<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.1136;0.2386;1"        dur="8.8s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="600" y="148" opacity="0">AGI<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.2386;0.3409;1"           dur="8.8s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="600" y="148" opacity="0">Soon<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.3409;0.4545;1"          dur="8.8s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="600" y="148" opacity="0">Consciousness<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.5114;0.6705;1" dur="8.8s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="600" y="148" opacity="0">is<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.6705;0.7614;1"            dur="8.8s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="600" y="148" opacity="0">Transdimensional<animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.7614;0.9432;1" dur="8.8s" calcMode="discrete" repeatCount="indefinite"/></text>
